name: slow-tests

on:
  pull_request:
    branches:
      - 'master'
      - 'main'
      - '*release*'
      - 'release/**'

jobs:
  slow-tests-spark34:
    runs-on: macos-13
    env:
      TF_CPP_MIN_LOG_LEVEL: 3
      JAVA_OPTS: "-Xmx4096m -XX:+UseG1GC"
    name: Slow Tests on Apache Spark 3.4.x

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
          architecture: x64
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.4.0 numpy pytest pytest-forked
      - name: Build Spark NLP
        run: |
          brew install sbt
          sbt -mem 4096 -Dis_spark34=true clean assemblyAndCopy
      - name: Run Slow Python Tests with Memory Isolation
        run: |
          cd python
          python3.8 -m pytest -v -m slow --forked